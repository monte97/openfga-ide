services:
  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:3000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  backend:
    image: node:22-slim
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - backend_modules:/app/backend/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - OPENFGA_URL=http://openfga:8080
      - PORT=3000
      - DATABASE_URL=postgresql://openfga_viewer:openfga_viewer@postgres:5432/openfga_viewer
    command: sh -c "npm install && npm run dev"
    depends_on:
      openfga:
        condition: service_started
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    command: run
    ports:
      - "8080:8080"
      - "8081:8081"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openfga_viewer
      POSTGRES_PASSWORD: openfga_viewer
      POSTGRES_DB: openfga_viewer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfga_viewer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  frontend_modules:
  backend_modules:
  postgres_data:
