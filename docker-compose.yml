services:
  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
      - frontend_modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

  backend:
    image: node:22-slim
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
      - backend_modules:/app/backend/node_modules
    ports:
      - "3000:3000"
    environment:
      - OPENFGA_URL=http://openfga:8080
      - PORT=3000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - openfga

  openfga:
    image: openfga/openfga:latest
    command: run
    ports:
      - "8080:8080"
      - "8081:8081"

volumes:
  frontend_modules:
  backend_modules:
